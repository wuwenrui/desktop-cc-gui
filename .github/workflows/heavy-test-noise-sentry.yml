name: Heavy Test Noise Sentry

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: heavy-test-noise-sentry-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heavy-test-noise-sentry:
    name: Heavy test noise sentry (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Heavy test noise parser tests
        run: node --test scripts/check-heavy-test-noise.test.mjs scripts/test-batched.test.mjs
      - name: Heavy test noise gate
        run: npm run check:heavy-test-noise
      - name: Upload heavy test noise log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-test-noise-log-${{ matrix.os }}
          path: .artifacts/heavy-test-noise.log
          if-no-files-found: ignore
