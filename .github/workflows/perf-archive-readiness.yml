name: Perf Archive Readiness

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: perf-archive-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    name: Perf archive readiness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    env:
      HAS_NO_PERF_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'no-perf-required') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        if: env.HAS_NO_PERF_LABEL != 'true'
        run: npm ci

      - name: Run perf archive readiness
        id: readiness
        if: env.HAS_NO_PERF_LABEL != 'true'
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts
          npm run --silent perf:archive-readiness -- --json > .artifacts/perf-archive-readiness.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          if [[ "${exit_code}" != "0" ]]; then
            cat .artifacts/perf-archive-readiness.json
          fi
          if [[ "${exit_code}" != "0" && "${exit_code}" != "2" ]]; then
            exit "${exit_code}"
          fi

      - name: Write no-perf-required report
        if: env.HAS_NO_PERF_LABEL == 'true'
        shell: bash
        run: |
          mkdir -p .artifacts
          cat > .artifacts/perf-archive-readiness.json <<'JSON'
          {
            "ok": true,
            "status": "notApplicable",
            "proxyRatio": null,
            "warnings": [],
            "hardFailures": [],
            "reason": "no-perf-required label present"
          }
          JSON

      - name: Report perf archive readiness
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const report = JSON.parse(fs.readFileSync(".artifacts/perf-archive-readiness.json", "utf8"));
            const proxyRatio = typeof report.proxyRatio === "number"
              ? `${(report.proxyRatio * 100).toFixed(1)}%`
              : "n/a";
            const warnings = Array.isArray(report.warnings) ? report.warnings.length : 0;
            const hardFailures = Array.isArray(report.hardFailures) ? report.hardFailures.length : 0;
            const lines = [
              "perf-archive-readiness",
              "",
              `status=${report.status}`,
              `ok=${report.ok}`,
              `proxyRatio=${proxyRatio}`,
              `warnings=${warnings}`,
              `hardFailures=${hardFailures}`,
            ];
            const body = lines.join("\n");
            await core.summary
              .addHeading("Perf archive readiness", 2)
              .addRaw(lines.slice(2).join("\n"))
              .write();

            const pullRequest = context.payload.pull_request;
            const isForkPullRequest = pullRequest?.head?.repo?.full_name !== pullRequest?.base?.repo?.full_name;
            if (isForkPullRequest) {
              core.warning("Skipping PR comment for fork pull request because GITHUB_TOKEN is read-only.");
              return;
            }

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            } catch (error) {
              core.warning(`Unable to create PR comment: ${error.message ?? String(error)}`);
            }
