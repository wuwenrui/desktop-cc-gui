name: Large File Governance Sentry

on:
  pull_request:
  push:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  large-file-sentry-hard-gate:
    name: Large file sentry (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Large file governance parser tests
        run: node --test scripts/check-large-files.test.mjs
      - name: Large file governance hard-debt gate
        run: npm run check:large-files:gate

  large-file-sentry-advisory-watch:
    name: Large file advisory watch
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Large file governance near-threshold watch
        run: npm run check:large-files:near-threshold
      - name: Upload near-threshold advisory report
        uses: actions/upload-artifact@v4
        with:
          name: large-files-near-threshold
          path: .artifacts/large-files-near-threshold.json
          if-no-files-found: ignore
