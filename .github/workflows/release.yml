name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build_macos:
    name: macos (${{ matrix.arch }})
    runs-on: ${{ matrix.platform }}
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: aarch64
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.13"
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      LAWYER_COPILOT_UPDATE_BASE_URL: ${{ vars.LAWYER_COPILOT_UPDATE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/weclaw/go.mod
          cache-dependency-path: sidecars/weclaw/go.sum

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-bin: false
          shared-key: v1-macos-${{ matrix.arch == 'aarch64' && 'arm64' || 'x64' }}-rust
          cache-on-failure: true

      - name: Configure sccache environment
        run: |
          set -euo pipefail
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install CMake
        run: brew install cmake

      - name: Install dependencies
        run: npm ci

      - name: Write Tauri signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          # DO NOT decode - Tauri expects base64-encoded key
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" > "$HOME/.tauri/ccgui.key"

      - name: Configure self-hosted updater endpoint
        run: node scripts/configure-updater-endpoint.mjs

      - name: Build app bundle
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          set -euo pipefail
          # Unsigned (ad-hoc) build: no Apple Developer ID required.
          # TAURI_SIGNING_PRIVATE_KEY expects base64-encoded minisign key
          export TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY_B64"
          npm run tauri -- build --bundles app

      - name: Package artifacts
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          mkdir -p release-artifacts

          # Resolve the .app bundle name from the build output (rename-proof)
          APP_PATH=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found" >&2
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          echo "Packaging $APP_NAME"

          # Apply a proper deep ad-hoc signature so the whole bundle's
          # resources are sealed. Tauri only emits a linker ad-hoc signature
          # (Sealed Resources=none), which Gatekeeper flags as "damaged" once
          # the download is quarantined on Apple Silicon. Deep ad-hoc signing
          # downgrades that hard block to the normal "unidentified developer"
          # prompt. Full zero-warning installs still require a paid Apple
          # Developer ID + notarization.
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          ditto -c -k --keepParent \
            "$APP_PATH" \
            release-artifacts/LawyerCopilot.zip

          ARCH="${{ matrix.arch }}"
          bash scripts/create-dmg.sh \
            "$APP_PATH" \
            release-artifacts/LawyerCopilot_${VERSION}_${ARCH}.dmg

          COPYFILE_DISABLE=1 tar -czf \
            src-tauri/target/release/bundle/macos/LawyerCopilot.app.tar.gz \
            -C src-tauri/target/release/bundle/macos "$APP_NAME"

          # Write the base64-encoded key to file (tauri signer expects this format)
          mkdir -p "$HOME/.tauri"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" > "$HOME/.tauri/ccgui.key"

          npm run tauri signer sign -- \
            -f "$HOME/.tauri/ccgui.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            src-tauri/target/release/bundle/macos/LawyerCopilot.app.tar.gz

          cp src-tauri/target/release/bundle/macos/LawyerCopilot.app.tar.gz \
            release-artifacts/LawyerCopilot_${ARCH}.app.tar.gz
          cp src-tauri/target/release/bundle/macos/LawyerCopilot.app.tar.gz.sig \
            release-artifacts/LawyerCopilot_${ARCH}.app.tar.gz.sig

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            release-artifacts/LawyerCopilot.zip
            release-artifacts/LawyerCopilot_*_${{ matrix.arch }}.dmg
            release-artifacts/LawyerCopilot_${{ matrix.arch }}.app.tar.gz
            release-artifacts/LawyerCopilot_${{ matrix.arch }}.app.tar.gz.sig

  build_linux:
    name: appimage (x86_64)
    runs-on: ubuntu-24.04
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      LAWYER_COPILOT_UPDATE_BASE_URL: ${{ vars.LAWYER_COPILOT_UPDATE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (linux only)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils libasound2-dev

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/weclaw/go.mod
          cache-dependency-path: sidecars/weclaw/go.sum

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-bin: false
          shared-key: v1-linux-x64-rust
          cache-on-failure: true

      - name: Configure sccache environment
        run: |
          set -euo pipefail
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: install frontend dependencies
        run: npm ci

      - name: Configure self-hosted updater endpoint
        run: node scripts/configure-updater-endpoint.mjs

      - name: build AppImage
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          set -euo pipefail
          # TAURI_SIGNING_PRIVATE_KEY expects base64-encoded minisign key
          export TAURI_SIGNING_PRIVATE_KEY="$TAURI_SIGNING_PRIVATE_KEY_B64"
          npm run tauri -- build --bundles appimage

      - name: prune bundled Wayland libraries from AppImage
        run: |
          set -euo pipefail
          mkdir -p .tools
          curl --fail --show-error --location \
            -o .tools/appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x .tools/appimagetool
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage artifact found" >&2
            exit 1
          fi
          node scripts/prune-appimage-wayland-libs.mjs \
            --appimage "$APPIMAGE" \
            --appimagetool "$PWD/.tools/appimagetool" \
            --arch x86_64
          rm -f "${APPIMAGE}.sig"

      - name: sign pruned AppImage
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage artifact found" >&2
            exit 1
          fi
          mkdir -p "$HOME/.tauri"
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_B64" > "$HOME/.tauri/ccgui.key"
          npm run tauri signer sign -- \
            -f "$HOME/.tauri/ccgui.key" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$APPIMAGE"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-x86_64
          path: src-tauri/target/release/bundle/appimage/*.AppImage*

  build_windows:
    name: windows (x64)
    runs-on: windows-latest
    environment: release
    env:
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      LAWYER_COPILOT_UPDATE_BASE_URL: ${{ vars.LAWYER_COPILOT_UPDATE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/weclaw/go.mod
          cache-dependency-path: sidecars/weclaw/go.sum

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-bin: false
          shared-key: v1-win-x64-rust
          cache-on-failure: true

      - name: Configure sccache environment
        shell: pwsh
        run: |
          "RUSTC_WRAPPER=sccache" >> $env:GITHUB_ENV
          "SCCACHE_GHA_ENABLED=true" >> $env:GITHUB_ENV
          "SCCACHE_DIR=$env:LOCALAPPDATA\sccache" >> $env:GITHUB_ENV

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install dependencies
        run: npm ci

      - name: Configure self-hosted updater endpoint
        shell: pwsh
        run: node scripts/configure-updater-endpoint.mjs

      - name: Build Windows installer
        shell: pwsh
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          # TAURI_SIGNING_PRIVATE_KEY expects base64-encoded minisign key
          $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_SIGNING_PRIVATE_KEY_B64
          npm run tauri -- build --config src-tauri/tauri.windows.conf.json --bundles nsis

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          echo "version=$($conf.version)" >> $env:GITHUB_OUTPUT

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  release:
    runs-on: ubuntu-latest
    environment: release
    env:
      LAWYER_COPILOT_UPDATE_BASE_URL: ${{ vars.LAWYER_COPILOT_UPDATE_BASE_URL }}
      LAWYER_COPILOT_UPDATE_ARTIFACT_BASE_URL: ${{ vars.LAWYER_COPILOT_UPDATE_ARTIFACT_BASE_URL }}
      LAWYER_COPILOT_UPDATE_UPLOAD_URL: ${{ vars.LAWYER_COPILOT_UPDATE_UPLOAD_URL }}
      LAWYER_COPILOT_UPDATE_UPLOAD_USER: ${{ secrets.LAWYER_COPILOT_UPDATE_UPLOAD_USER }}
      LAWYER_COPILOT_UPDATE_UPLOAD_PASSWORD: ${{ secrets.LAWYER_COPILOT_UPDATE_UPLOAD_PASSWORD }}
    needs:
      - build_macos
      - build_linux
      - build_windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: release-artifacts
          merge-multiple: true

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: appimage-x86_64
          path: release-artifacts

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-artifacts

      - name: Build latest.json
        run: |
          set -euo pipefail
          UPDATE_BASE_URL=$(node -e 'import("./scripts/configure-updater-endpoint.mjs").then(({ normalizeUpdateBaseUrl }) => console.log(normalizeUpdateBaseUrl(process.env.LAWYER_COPILOT_UPDATE_BASE_URL))).catch((error) => { console.error(error.message); process.exit(1); })')
          UPDATE_ARTIFACT_BASE_URL=$(node -e 'import("./scripts/configure-updater-endpoint.mjs").then(({ normalizeUpdateBaseUrl }) => console.log(normalizeUpdateBaseUrl(process.env.LAWYER_COPILOT_UPDATE_ARTIFACT_BASE_URL || process.env.LAWYER_COPILOT_UPDATE_BASE_URL))).catch((error) => { console.error(error.message); process.exit(1); })')
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -v "^v${VERSION}$" \
            | head -n 1 || true)
          RANGE_END="${GITHUB_SHA}"
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          else
            git log "${RANGE_END}" --pretty=format:"%s" > release-artifacts/release-commits.txt
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          lines = Path("release-artifacts/release-commits.txt").read_text().splitlines()
          pattern = re.compile(r"^(feat|fix|perf)(?:\([^)]*\))?:\s*(.+)$", re.IGNORECASE)
          groups = {"feat": [], "fix": [], "perf": []}
          for line in lines:
              match = pattern.match(line.strip())
              if not match:
                  continue
              kind = match.group(1).lower()
              message = match.group(2).strip()
              if message:
                  groups[kind].append(message)

          sections = [
              ("## New Features", "feat"),
              ("## Fixes", "fix"),
              ("## Performance Improvements", "perf"),
          ]
          output = []
          for title, key in sections:
              items = groups[key]
              if not items:
                  continue
              output.append(title)
              output.extend([f"- {item}" for item in items])
              output.append("")

          notes = "\n".join(output).strip()
          if not notes:
              notes = "- No user-facing changes."

          Path("release-artifacts/release-notes.md").write_text(notes + "\n")
          PY

          VERSION="$VERSION" UPDATE_BASE_URL="$UPDATE_BASE_URL" UPDATE_ARTIFACT_BASE_URL="$UPDATE_ARTIFACT_BASE_URL" python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import quote

          notes = Path("release-artifacts/release-notes.md").read_text().strip()
          artifacts_dir = Path("release-artifacts")
          update_base_url = os.environ["UPDATE_BASE_URL"].rstrip("/")
          update_artifact_base_url = os.environ["UPDATE_ARTIFACT_BASE_URL"].rstrip("/")
          artifact_url_base = update_artifact_base_url

          def artifact_url(name):
              return f"{artifact_url_base}/{quote(name)}"

          platforms = {
            "darwin-aarch64": {
              "url": artifact_url("LawyerCopilot_aarch64.app.tar.gz"),
              "signature": (artifacts_dir / "LawyerCopilot_aarch64.app.tar.gz.sig").read_text().strip(),
            }
          }

          # Find Linux AppImages
          appimages = list(artifacts_dir.rglob("*.AppImage.tar.gz"))
          if not appimages:
            appimages = list(artifacts_dir.rglob("*.AppImage"))

          def detect_arch(name):
            lowered = name.lower()
            if "aarch64" in lowered or "arm64" in lowered:
              return "aarch64"
            if "x86_64" in lowered or "amd64" in lowered:
              return "x86_64"
            return None

          for appimage in appimages:
            arch = detect_arch(appimage.name)
            if not arch:
              continue
            sig_path = appimage.with_suffix(appimage.suffix + ".sig")
            if sig_path.exists():
              platforms[f"linux-{arch}"] = {
                "url": artifact_url(appimage.name),
                "signature": sig_path.read_text().strip(),
              }

          # Find Windows NSIS installer (Tauri 2 generates .exe + .exe.sig)
          nsis_exes = [f for f in artifacts_dir.rglob("*-setup.exe") if not f.name.endswith(".sig")]
          for nsis_exe in nsis_exes:
            sig_path = Path(str(nsis_exe) + ".sig")
            if sig_path.exists():
              platforms["windows-x86_64"] = {
                "url": artifact_url(nsis_exe.name),
                "signature": sig_path.read_text().strip(),
              }
              break

          payload = {
            "version": os.environ["VERSION"],
            "notes": notes,
            "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "platforms": platforms,
          }

          Path("release-artifacts/latest.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Upload updater artifacts to self-hosted server
        run: |
          set -euo pipefail
          : "${LAWYER_COPILOT_UPDATE_UPLOAD_USER:?missing LAWYER_COPILOT_UPDATE_UPLOAD_USER secret}"
          : "${LAWYER_COPILOT_UPDATE_UPLOAD_PASSWORD:?missing LAWYER_COPILOT_UPDATE_UPLOAD_PASSWORD secret}"
          UPDATE_UPLOAD_URL="${LAWYER_COPILOT_UPDATE_UPLOAD_URL:-${LAWYER_COPILOT_UPDATE_BASE_URL/downloads/update-upload}}"
          UPDATE_UPLOAD_URL="${UPDATE_UPLOAD_URL%/}"

          find release-artifacts -maxdepth 1 -type f -print0 | while IFS= read -r -d '' artifact; do
            name="$(basename "$artifact")"
            curl --fail --show-error --silent \
              --user "$LAWYER_COPILOT_UPDATE_UPLOAD_USER:$LAWYER_COPILOT_UPDATE_UPLOAD_PASSWORD" \
              --upload-file "$artifact" \
              "$UPDATE_UPLOAD_URL/$name"
          done

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          ASSETS=()
          for pattern in \
            "release-artifacts/LawyerCopilot.zip" \
            "release-artifacts/LawyerCopilot_*_aarch64.dmg" \
            "release-artifacts/LawyerCopilot_*_x86_64.dmg" \
            "release-artifacts/LawyerCopilot_aarch64.app.tar.gz" \
            "release-artifacts/LawyerCopilot_aarch64.app.tar.gz.sig" \
            "release-artifacts/LawyerCopilot_x86_64.app.tar.gz" \
            "release-artifacts/LawyerCopilot_x86_64.app.tar.gz.sig" \
            "release-artifacts/*.AppImage*" \
            "release-artifacts/*-setup.exe" \
            "release-artifacts/*-setup.exe.sig" \
            "release-artifacts/latest.json"
          do
            for f in $pattern; do
              [ -e "$f" ] && ASSETS+=("$f")
            done
          done

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-artifacts/release-notes.md \
            --target "$GITHUB_SHA" \
            "${ASSETS[@]}"

      - name: Bump version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )

          NEXT_VERSION=$(python3 - <<'PY' "$VERSION"
          import sys

          version = sys.argv[1]
          parts = version.split(".")
          if len(parts) != 3:
              raise SystemExit("Expected version like 0.X.Y")

          major, minor, patch = (int(p) for p in parts)
          print(f"{major}.{minor}.{patch + 1}")
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version "$NEXT_VERSION" --no-git-tag-version

          python3 - <<PY
          import json
          from pathlib import Path

          path = Path("src-tauri/tauri.conf.json")
          data = json.loads(path.read_text())
          data["version"] = "$NEXT_VERSION"
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${NEXT_VERSION}"
          # Commit the post-release bump straight to the release branch.
          # Solo fork: no PR needed, and this avoids the "Actions cannot
          # create PRs" restriction that the open-PR approach hit.
          git push origin "HEAD:${GITHUB_REF_NAME}"
